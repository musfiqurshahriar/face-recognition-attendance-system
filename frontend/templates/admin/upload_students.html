{% extends "base.html" %}
{% block content %}
<h2>Student List Update করো</h2>

<div style="background:white; padding:24px; border-radius:8px;
     box-shadow:0 2px 8px rgba(0,0,0,0.08); max-width:500px;">

    <p style="margin-bottom:16px; color:#555;">
        Excel ফাইলে এই columns থাকতে হবে:<br>
        <code>name, roll, section, login_email,
        login_password, guardian_email, semester</code>
    </p>

    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Excel ফাইল (.xlsx)</label>
            <input type="file" name="excel_file" accept=".xlsx" required>
        </div>
        <button type="submit" class="btn-primary">Upload করো</button>
    </form>
</div>
{% endblock %}
