{% extends "base.html" %}
{% block content %}
<h2>Password পরিবর্তন করো</h2>

<div class="upload-box" style="max-width:420px">
    <form method="POST">
        <div class="form-group">
            <label>বর্তমান Password</label>
            <div style="position:relative">
                <input type="password" name="current_password" id="cur"
                       placeholder="বর্তমান password" required
                       style="width:100%; padding-right:44px">
                <span onclick="toggle('cur','i1')" id="i1"
                      style="position:absolute;right:12px;top:50%;
                             transform:translateY(-50%);cursor:pointer;font-size:16px">👁</span>
            </div>
        </div>
        <div class="form-group">
            <label>নতুন Password</label>
            <div style="position:relative">
                <input type="password" name="new_password" id="np"
                       placeholder="নতুন password" required
                       style="width:100%; padding-right:44px">
                <span onclick="toggle('np','i2')" id="i2"
                      style="position:absolute;right:12px;top:50%;
                             transform:translateY(-50%);cursor:pointer;font-size:16px">👁</span>
            </div>
        </div>
        <div class="form-group">
            <label>নতুন Password নিশ্চিত করো</label>
            <div style="position:relative">
                <input type="password" name="confirm_password" id="cp"
                       placeholder="আবার লেখো" required
                       style="width:100%; padding-right:44px">
                <span onclick="toggle('cp','i3')" id="i3"
                      style="position:absolute;right:12px;top:50%;
                             transform:translateY(-50%);cursor:pointer;font-size:16px">👁</span>
            </div>
        </div>
        <button type="submit" class="btn-primary" style="width:100%">
            Password পরিবর্তন করো
        </button>
    </form>
</div>

<script>
function toggle(inputId, iconId) {
    var input = document.getElementById(inputId);
    var icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
    } else {
        input.type = 'password';
        icon.textContent = '👁';
    }
}
</script>
{% endblock %}
