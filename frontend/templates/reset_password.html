<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>👤 নতুন Password সেট করো</h2>
        <p class="login-subtitle">কমপক্ষে ৬ অক্ষরের password দিন</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>নতুন Password</label>
                <div style="position:relative">
                    <input type="password" name="new_password" id="np"
                           placeholder="নতুন password" required
                           style="width:100%;padding-right:44px">
                    <span onclick="toggle('np','i1')" id="i1"
                          style="position:absolute;right:12px;top:50%;
                                 transform:translateY(-50%);cursor:pointer;font-size:16px">👁</span>
                </div>
            </div>
            <div class="form-group">
                <label>Password নিশ্চিত করো</label>
                <div style="position:relative">
                    <input type="password" name="confirm_password" id="cp"
                           placeholder="আবার লেখো" required
                           style="width:100%;padding-right:44px">
                    <span onclick="toggle('cp','i2')" id="i2"
                          style="position:absolute;right:12px;top:50%;
                                 transform:translateY(-50%);cursor:pointer;font-size:16px">👁</span>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width:100%">
                Password পরিবর্তন করো
            </button>
        </form>
    </div>
</div>

<script>
function toggle(inputId, iconId) {
    var input = document.getElementById(inputId);
    var icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
    } else {
        input.type = 'password';
        icon.textContent = '👁';
    }
}
</script>
</body>
</html>
