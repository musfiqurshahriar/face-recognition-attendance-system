<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Admin কি Password ভুলে গেছেন?</h2>
        <p class="login-subtitle">Admin এর Gmail দিন — Reset link পাঠানো হবে</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" name="email"
                       placeholder="admin@gmail.com" required>
            </div>
            <button type="submit" class="btn-primary">Reset Link পাঠাও</button>
        </form>

        <p style="text-align:center;margin-top:16px">
            <a href="{{ url_for('auth.login') }}"
               style="color:var(--accent);font-size:13px">
                ← Login এ ফিরে যাও
            </a>
        </p>
    </div>
</div>
</body>
</html>
